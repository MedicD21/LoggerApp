name: Log_The_Food_Dushin
options:
  bundleIdPrefix: com.dustinschaaf
  deploymentTarget:
    iOS: "17.0"
schemes:
  LoggerApp:
    build:
      targets:
        LoggerApp: all
        LoggerAppTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: LoggerAppTests
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Log The Food Dushin
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.healthcare-fitness
    INFOPLIST_KEY_NSCameraUsageDescription: Capture meals and scan barcodes for food logging.
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Import meal photos for AI-assisted food logging.
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Save exported nutrition data files.
    INFOPLIST_KEY_NSHealthShareUsageDescription: Optional Apple Health weight sync is available when you enable it.
    INFOPLIST_KEY_NSHealthUpdateUsageDescription: Optional Apple Health weight sync can write confirmed weight entries.
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
targets:
  LoggerApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LoggerApp
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Seeds
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinschaaf.LogTheFoodDushin
        PRODUCT_NAME: Log The Food Dushin
        PRODUCT_MODULE_NAME: LoggerApp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
  LoggerAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LoggerAppTests
        excludes:
          - Fixtures
      - path: LoggerAppTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: LoggerApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dustinschaaf.LogTheFoodDushinTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Log The Food Dushin.app/Log The Food Dushin
        BUNDLE_LOADER: $(TEST_HOST)
